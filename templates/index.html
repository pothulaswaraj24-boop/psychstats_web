<!DOCTYPE html>
<html>

<head>
    <title>PsychStats Web App</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f7fa;
        }

        .container-box {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-top: 30px;
        }

        img {
            margin-top: 15px;
            border-radius: 8px;
            width: 100%;
            max-width: 900px;
            height: auto;
            border: 2px solid #ddd;
        }
    </style>
</head>

<body>

<!-- 🔷 HEADER -->
<div style="display:flex; justify-content:space-between; align-items:center; padding:12px 20px; background:#222; color:white;">
    <h3>📊 PsychStats Dashboard</h3>
    <div>
        Welcome, <b>{{ username }}</b> |
        <a href="/logout" style="color:#ff4d4d;">Logout</a>
    </div>
</div>

<div class="container-fluid" style="max-width:1200px;">

    <h2 class="text-center mt-4">📊 PsychStats Web App</h2>

    <!-- 🔷 UPLOAD -->
    <div class="container-box">
        <form method="POST" enctype="multipart/form-data">
            <label><b>Upload CSV</b></label>
            <input type="file" name="file" class="form-control mb-2" required>
            <button type="submit" name="upload" value="1" class="btn btn-primary w-100">Upload</button>
        </form>
    </div>

    <!-- 🔷 ANALYSIS -->
    <div class="container-box">
        <form method="POST">

            <div class="mb-3">
                <label><b>Select Test</b></label>
                <select name="test" class="form-select">
                    <option value="ttest">T-Test</option>
                    <option value="correlation">Correlation</option>
                    <option value="anova">ANOVA</option>
                </select>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <label>Column 1</label>
                    <select name="col1" class="form-select">
                        {% for col in columns %}
                        <option value="{{ col }}">{{ col }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-6">
                    <label>Column 2</label>
                    <select name="col2" class="form-select">
                        {% for col in columns %}
                        <option value="{{ col }}">{{ col }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="mt-3">
                <label>ANOVA Columns</label>
                <select name="anova_cols" class="form-select" multiple>
                    {% for col in columns %}
                    <option value="{{ col }}">{{ col }}</option>
                    {% endfor %}
                </select>
            </div>

            <button type="submit" name="analyze" class="btn btn-success mt-4 w-100">Run Analysis</button>
        </form>
    </div>

    <!-- 🔷 RESULT -->
    {% if result %}
    <div class="container-box">
        <h4>Result</h4>
        <p>{{ result }}</p>

        {% if graph %}
        <div class="text-center">
            <img src="{{ graph }}">
        </div>
        {% endif %}
    </div>
    {% endif %}

    <!-- 🔷 DOWNLOAD -->
    <div class="text-center mt-3">
        <a href="/download" class="btn btn-warning">Download PDF</a>
    </div>

</div>

</body>
</html>
