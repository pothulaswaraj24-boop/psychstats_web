<!DOCTYPE html>
<html>
<div style="padding:20px;">
<head>

    <title>PsychStats Web App</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f7fa;
        }

        .container-box {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-top: 30px;
        }

        h2 {
            font-weight: bold;
        }

        img {
            margin-top: 15px;
            border-radius: 8px;
        }
    </style>

</head>
</div>
<body>


<div style="display:flex; justify-content:space-between; align-items:center; padding:12px 20px; background:#222; color:white;">
  
    
    <h3>📊 PsychStats Dashboard</h3>
    
    <div>
        Welcome, <b>{{ username if username else "User" }}</b>
        |
        <a href="/logout" style="color:#ff4d4d; text-decoration:none;">Logout</a>
    </div>

</div>

<div class="container">

    <h2 class="text-center mt-4">📊 PsychStats Web App</h2>

    <div class="container-box">
        
        <div style="background:#f4f4f4; padding:20px; border-radius:10px; margin-bottom:20px;">
        <!-- 🔹 Upload -->
        <form method="POST" enctype="multipart/form-data" class="mb-4">
            <label class="form-label"><b>Upload CSV File</b></label>
            <input type="file" name="file" class="form-control mb-2" required>
            <button type="submit" name="upload" value="1" class="btn btn-primary w-100">
                Upload CSV
            </button>
        </form>
        </div>

        <hr>

        <!-- 🔹 Analysis -->
        <form method="POST">

            <input type="hidden" name="file_path" value="{{ file_path }}">

            <div class="mb-3">
                <label class="form-label"><b>Select Test</b></label>
                <select name="test" class="form-select">
                    <option value="ttest">T-Test</option>
                    <option value="correlation">Correlation</option>
                    <option value="anova">ANOVA</option>
                </select>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <label><b>Column 1</b></label>
                    <select name="col1" class="form-select">
                        {% if columns %}
                            {% for col in columns %}
                                <option value="{{ col }}">{{ col }}</option>
                            {% endfor %}
                        {% else %}
                            <option>No file uploaded</option>
                        {% endif %}
                    </select>
                </div>

                <div class="col-md-6">
                    <label><b>Column 2</b></label>
                    <select name="col2" class="form-select">
                        {% if columns %}
                            <option value="">-- Select Different Column --</option>
                            {% for col in columns %}
                                <option value="{{ col }}">{{ col }}</option>
                            {% endfor %}
                        {% else %}
                            <option>No file uploaded</option>
                        {% endif %}
                    </select>
                </div>
            </div>
             
            <p style="color:gray; font-size:13px;">
               (Use ANOVA only when selecting 3 or more columns)
            </p>

            <div class="mt-3">
                <label><b>ANOVA Columns (Ctrl+Click)</b></label>
                <select name="anova_cols" class="form-select" multiple size="5">
                    {% if columns %}
                        {% for col in columns %}
                            <option value="{{ col }}">{{ col }}</option>
                        {% endfor %}
                    {% else %}
                        <option>No data</option>
                    {% endif %}
                </select>
            </div>

            <button type="submit" name="analyze" class="btn btn-success mt-4 w-100">
                Run Analysis
            </button>

        </form>

    </div>
    <div style="background:#fff; padding:20px; border-radius:10px; margin-top:20px;">
    <!-- 🔹 RESULT -->
    {% if result %}
    <div class="container-box mt-4">
        <h4>📈 Result</h4>
        <p>{{ result }}</p>

        {% if graph %}
            <img src="{{ graph }}" class="img-fluid">
        {% endif %}
    </div>
    {% endif %}
    </div>

</div>

<div class="text-center">
<a href="/download">
    <button style="padding:10px 20px; margin-top:10px;">Download PDF</button>
</a>
</div>

<a href="/download" class="btn btn-warning mt-3">Download PDF</a>

</body>
</html>
